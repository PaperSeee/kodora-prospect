<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#09090b; display:flex; align-items:center; justify-content:center; height:100vh; font-family:-apple-system,sans-serif; flex-direction:column; gap:16px; }
  .logo { width:72px; height:72px; background:#4F46E5; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:40px; font-weight:700; color:white; }
  .title { color:white; font-size:22px; font-weight:600; }
  .sub { color:#71717a; font-size:14px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .dot { animation:pulse 1.2s infinite; }
</style>
</head>
<body>
  <div class="logo">K</div>
  <div class="title">Kodora Prospect</div>
  <div class="sub">Démarrage<span class="dot">...</span></div>
</body>
</html>
